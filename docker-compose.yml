version: "3.9"

# Docker-ийн json-file driver хэмжээ хязгааргүй лог хуримтлуулж диск дүүрэх
# шалтгаан болдог тул rotation тохируулна.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_API_URL: ${NEXT_API_URL}
        NEXT_GS_URL: ${NEXT_GS_URL}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      TZ: Asia/Ulaanbaatar
      NODE_ENV: production
      NEXT_API_URL: ${NEXT_API_URL}
      NEXT_GS_URL: ${NEXT_GS_URL}
    restart: on-failure
    logging: *default-logging
    networks:
      - gov_network

networks:
  gov_network:
    name: gov_network
    external: true
